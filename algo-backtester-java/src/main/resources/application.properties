server.port=8080
spring.application.name=quantedge-java

# Serialise LocalDate as ISO string "2024-01-15" not array [2024,1,15]
spring.jackson.serialization.write-dates-as-timestamps=false

# Suppress Spring Boot banner in logs
spring.main.banner-mode=off

# Logging — keep it quiet except for errors
logging.level.root=WARN
logging.level.com.kevin.algo=INFO
